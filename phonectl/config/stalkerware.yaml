# Known stalkerware, spyware, and surveillance app package names.
#
# Sources: Coalition Against Stalkerware, EFF, Kaspersky, Lookout,
# ESET, Avast threat intelligence, and community reports.
#
# Categories:
#   stalkerware  — commercial surveillance (partner/employee monitoring)
#   spyware      — covert data theft
#   rat          — remote access trojan
#   tracker      — covert location tracking
#   keylogger    — keystroke capture

stalkerware:
  # ── Commercial Stalkerware ──
  - name: FlexiSpy
    category: stalkerware
    packages:
      - com.flexispy.app
      - com.flexispy.callrecord
      - com.yourphone.monitor
      - com.flexispy.monitor
      - th.co.flexispy

